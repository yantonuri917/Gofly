<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Gofile Generator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #141d2a; color: white; display: flex; justify-content: center; padding: 20px; }
        .box { background: #192330; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; border: 1px solid #222f3e; }
        h2 { margin-top: 0; color: #f59f00; }
        label { font-size: 13px; color: #94a3b8; display: block; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; }
        button { width: 100%; padding: 14px; margin-top: 20px; background: #1877f2; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #1664d4; }
        #result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 6px; display: none; }
        .copy-btn { background: #2ecc71; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Admin Generator</h2>
    <label>Judul Video</label>
    <input type="text" id="vidTitle" placeholder="Contoh: Video Liburan">
    
    <label>URL Video / Embed</label>
    <input type="text" id="vidUrl" placeholder="https://...">
    
    <button onclick="generate()">Generate Shareable Link</button>

    <div id="result">
        <p style="font-size: 12px; margin: 0;">Link untuk dibagikan:</p>
        <input type="text" id="shareLink" readonly style="margin-top: 5px;">
        <button class="copy-btn" onclick="copyLink()">Copy Link</button>
    </div>
</div>

<script>
    // --- KONFIGURASI ---
    const SUPABASE_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE";

    // Bagian password sudah dihapus agar langsung terbuka

    // Fungsi membuat kode acak
    function generateRandomString(length) {
        const characters = 'abcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += characters.charAt(Math.floor(Math.random() * characters.length));
        }
        return result;
    }

    // Fungsi Utama
    async function generate() {
        const title = document.getElementById('vidTitle').value;
        const url = document.getElementById('vidUrl').value;
        const btn = document.querySelector('button');
        
        if (!title || !url) { alert("Judul dan URL harus diisi!"); return; }

        const slug = generateRandomString(8); 
        btn.innerText = "Memproses...";
        btn.disabled = true;

        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list`, {
                method: 'POST',
                headers: { 
                    'apikey': SUPABASE_KEY, 
                    'Authorization': `Bearer ${SUPABASE_KEY}`, 
                    'Content-Type': 'application/json', 
                    'Prefer': 'return=representation' 
                },
                body: JSON.stringify({ name: title, url: url, slug: slug })
            });

            const data = await res.json();

            if (res.ok) {
                const shareLink = `${window.location.origin}/d/${slug}`;
                document.getElementById('shareLink').value = shareLink;
                document.getElementById('result').style.display = 'block';
            } else {
                alert("Gagal: " + JSON.stringify(data));
            }
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.innerText = "Generate Shareable Link";
            btn.disabled = false;
        }
    }

    function copyLink() {
        const copyText = document.getElementById("shareLink");
        copyText.select();
        document.execCommand("copy");
        alert("Link disalin!");
    }
</script>
</body>
</html>
