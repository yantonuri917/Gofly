<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Link Generator</title>
    <style>
        body { font-family: sans-serif; background: #141d2a; color: white; display: flex; justify-content: center; padding: 50px; }
        .box { background: #192330; padding: 20px; border-radius: 8px; width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2ecc71; border: none; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Input Video Baru</h2>
        <input type="text" id="vidTitle" placeholder="Judul Video">
        <input type="text" id="vidUrl" placeholder="URL Video / Embed">
        <button onclick="generate()">Generate Link</button>
        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script>
        // Masukkan Supabase Config Anda di sini
        const SUPABASE_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE";

        // Password Sederhana
        if(prompt("Password Admin:") !== "admin123") window.location.href = "about:blank";

        async function generate() {
            const title = document.getElementById('vidTitle').value;
            const url = document.getElementById('vidUrl').value;
            
            const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                body: JSON.stringify({ name: title, url: url })
            });
            const data = await res.json();
            const shareLink = `${window.location.origin}/watch.html?id=${data[0].id}`;
            document.getElementById('result').innerHTML = `<p>Link berhasil dibuat:</p><input value="${shareLink}" readonly><button onclick="alert('Copied!')">Copy Link</button>`;
        }
    </script>
</body>
</html>
