<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Media Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #141d2a; color: #bdc8d3; font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .file-item { background: #192330; border: 1px solid #222f3e; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
        
        /* Layout Flex untuk Thumbnail Kecil */
        .file-content { display: flex; align-items: flex-start; gap: 12px; }
        
        .preview-box { 
            width: 100px; /* Ukuran Thumbnail Kecil */
            height: 60px; 
            background: #000; 
            border-radius: 4px; 
            overflow: hidden; 
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: all 0.4s ease;
        }

        /* Saat diklik, thumbnail membesar */
        .preview-box.expanded {
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        
        .play-overlay { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:white; font-size: 20px; }
        .expanded .play-overlay { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="fileList"></div>
</div>

<script>
    const SUPABASE_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE";

    async function loadFiles() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const data = await res.json();
        const list = document.getElementById('fileList');
        
        list.innerHTML = data.map(item => `
            <div class="file-item">
                <div class="file-content">
                    <div class="preview-box" onclick="expandVideo(this)">
                        <video src="${item.url}#t=0.5" muted></video>
                        <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
                    </div>
                    <div style="flex:1;">
                        <div style="color:white; font-weight:600; font-size:14px;">${item.name}</div>
                        <div style="font-size:11px; margin-top:4px;">${new Date(item.created_at).toLocaleDateString()}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function expandVideo(el) {
        el.classList.add('expanded');
        const video = el.querySelector('video');
        video.setAttribute('controls', 'true');
        video.play();
    }

    loadFiles();
</script>
</body>
</html>
