<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goflie - Watch</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .file-row { background: white; margin-bottom: 10px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        iframe, video { width: 100%; max-height: 400px; display: none; margin-top: 10px; }
        .is-expanded iframe, .is-expanded video { display: block; }
    </style>
</head>
<body>

    <div id="loadingSpinner" style="display:none;"><div class="spinner"></div></div>
    <div id="fileListContainer"></div>

    <script>
        // --- KONFIGURASI LANGSUNG (Tanpa file eksternal) ---
        const API_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co/rest/v1";
        const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE"; // GANTI INI DENGAN KEY ANDA

        async function init() {
            const container = document.getElementById('fileListContainer');
            const spinner = document.getElementById('loadingSpinner');

            // 1. Deteksi Slug
            const paths = window.location.pathname.split('/').filter(p => p && p !== 'd' && p !== 'watch.html');
            let slug = paths.length > 0 ? paths[0] : new URLSearchParams(window.location.search).get('id');

            console.log("Mencari slug:", slug);

            if (!slug) {
                container.innerHTML = "<p style='text-align:center;'>Slug tidak ditemukan di URL.</p>";
                return;
            }

            spinner.style.display = 'block';

            try {
                // 2. Fetch data
                const response = await fetch(`${API_URL}/videos_list?slug=eq.${encodeURIComponent(slug)}`, {
                    headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' }
                });
                
                if (!response.ok) throw new Error("Gagal mengambil data");
                
                const data = await response.json();
                
                if (data.length === 0) {
                    container.innerHTML = `<p style='text-align:center;'>Tidak ada data untuk slug: <b>${slug}</b></p>`;
                } else {
                    renderFileList(data);
                }
            } catch (error) {
                container.innerHTML = `<p style='text-align:center; color:red;'>Error: ${error.message}</p>`;
            } finally {
                spinner.style.display = 'none';
            }
        }

        function renderFileList(files) {
            const container = document.getElementById('fileListContainer');
            container.innerHTML = files.map(file => `
                <div class="file-row">
                    <h3>${file.name}</h3>
                    <div class="preview-card-box" onclick="toggleVideo(this)">
                        ${file.url.includes('videas.fr') 
                            ? `<iframe src="${file.url}" frameborder="0" allowfullscreen></iframe>` 
                            : `<video src="${file.url}" playsinline></video>`}
                    </div>
                    <button onclick="toggleVideo(this.previousElementSibling)">Play / Close</button>
                </div>
            `).join('');
        }

        function toggleVideo(el) {
            const row = el.closest('.file-row');
            row.classList.toggle('is-expanded');
            const media = row.querySelector('video, iframe');
            if(media && media.tagName === 'VIDEO') media.play();
        }

        window.onload = init;
    </script>
</body>
</html>
