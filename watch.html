    <style>

            padding: 0;

            background-color: #141d2a;

            overflow-x: hidden;

        }

        aside {

            border-right: 1px solid #222f3e;
            display: flex;
            flex-direction: column;
            padding: 20px 14px;

            transition: transform 0.3s ease, margin-left 0.3s ease;
            z-index: 1000;

        }

        body.sidebar-toggled aside {

        .brand-logo {

            align-items: center;

            color: #ffffff;

            margin-bottom: 24px;
            padding-left: 6px;
        }

        .account-selector {
            background-color: #202c3c;
            border: 1px solid #34495e;
            border-radius: 6px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;

        }
        .account-info {

            align-items: center;

        }
        .account-avatar {

            height: 24px;

            background: linear-gradient(45deg, #f35588, #05dfd7);
        }

        .btn-add-account {
            background-color: #1877f2;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;

            margin-bottom: 24px;
            width: 100%;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;

        }
        .nav-item a {

        }
        .nav-item a i {
            width: 18px;
            font-size: 16px;
            text-align: center;
            color: #94a3b8;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 998;
        }
        body.sidebar-toggled .sidebar-overlay { display: block; }

        
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background-color: #141d2a;
            transition: all 0.3s ease;
        }

        .top-navbar {
            height: 60px;
            background-color: #192330;
            border-bottom: 1px solid #222f3e;
            display: flex;
            align-items: center;
            padding: 0 24px;
        }
        
        .btn-toggle-menu {
            background-color: #1c2838;
            color: #bdc8d3;
            border: 1px solid #2d3d52;
            width: 38px;
            height: 38px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        .btn-toggle-menu:hover { background-color: #202c3c; color: #ffffff; border-color: #1877f2; }

        main {
            flex: 1;
            padding: 24px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .folder-root-info { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
        .folder-large-icon { position: relative; font-size: 42px; color: #f59f00; }
        .folder-large-badge { position: absolute; bottom: 0; left: -4px; background-color: #2b3a4a; color: #ffffff; font-size: 10px; font-weight: bold; padding: 1px 5px; border-radius: 10px; border: 2px solid #141d2a; }
        .folder-title-details h2 { font-size: 18px; font-weight: 700; color: #ffffff; }
        .folder-title-details p { font-size: 12px; color: #627d98; margin-top: 2px; }
        .badge-status { display: inline-block; background-color: #2d3748; color: #a0aec0; font-size: 11px; padding: 1px 6px; border-radius: 4px; margin-top: 4px; }
        .btn-more-options { background-color: #202c3c; border: 1px solid #34495e; color: white; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 6px; }

      
        .gofile-toolbar { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #222f3e; 
            padding-bottom: 16px; 
            align-items: center; 
        }

        .tool-btn { background-color: #202c3c; color: #ced5e0; border: 1px solid #2d3d52; padding: 7px 14px; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; height: 38px; }
        .tool-btn:hover { background-color: #29394e; color: #fff; }
        .tool-btn.btn-share { background-color: #2ecc71; color: white; border: none; }
        .tool-btn.btn-create-folder { background-color: #1877f2; color: white; border: none; }
        .tool-btn.btn-upload { background-color: #1877f2; color: white; border: none; }

     
        .file-list-container { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
        
       
        .file-row { 
            display: flex; 
            flex-direction: row; 
            align-items: flex-start;
            background-color: transparent; 
            position: relative; 
            border-bottom: 1px solid #1e293b; 
            padding-bottom: 16px; 
            gap: 16px;
        }

       
        .file-media-render-zone {
            display: flex;
            flex-shrink: 0;
        }

      
.preview-card-box {
    width: 140px;
    height: 90px;
    background-color: #000000;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 1px solid #1e293b;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.3s ease;
}

.preview-card-box video { 
    width: 100%; 
    height: 100%; 
   
    object-fit: contain; 
    background-color: #000000;
}
        
       
        .preview-card-box::after {
            content: '\f04b';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.4);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .preview-card-box:hover::after { opacity: 1; }

     
        .file-top-control-bar {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
            gap: 14px;
            height: 90px;
        }

        .file-header-info { 
            display: flex; 
            flex-direction: column; 
            flex: 1;
            min-width: 0;
        }
        .file-name { font-size: 15px; font-weight: 600; color: #ffffff; word-break: break-all; line-height: 1.4; }
        .file-meta-sub { font-size: 12px; color: #627d98; margin-top: 4px; display: flex; flex-direction: row; gap: 12px; }

        .file-actions-right { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            flex-shrink: 0;
            margin-left: auto;
        }
        .btn-gofile-action { background-color: #192330; color: #ffffff; border: 1px solid #2d3d52; padding: 6px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-gofile-action:hover { background-color: #253346; }
        .btn-more-vertical { background-color: transparent; border: none; color: #627d98; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

       
        .file-row.is-expanded {
            flex-direction: column;
            gap: 12px;
        }
        .file-row.is-expanded .file-top-control-bar {
            width: 100%;
            height: auto;
        }
        .file-row.is-expanded .file-media-render-zone {
            width: 100%;
        }
        .file-row.is-expanded .preview-card-box { 
            width: 100%; 
            max-width: 720px; 
            height: auto; 
            aspect-ratio: 16 / 9; 
            cursor: default;
        }
        .file-row.is-expanded .preview-card-box::after { display: none; }
        .file-row.is-expanded .preview-card-box video { 
            object-fit: contain; 
        }
        
        .pagination-text { text-align: center; font-size: 13px; color: #627d98; margin: 30px 0 10px; }

      
        @media (max-width: 992px) {
            aside {
                position: fixed;
                height: 100vh;
                left: 0;
                top: 0;
                transform: translateX(-240px);
                margin-left: 0;
            }
            body.sidebar-toggled aside { transform: translateX(0); margin-left: 0; }
            body:not(.sidebar-toggled) .workspace { margin-left: 0; }
            body.sidebar-toggled .workspace { margin-left: 0; }

            .gofile-toolbar .tool-btn span { display: none; }
            .gofile-toolbar .tool-btn { padding: 10px 12px; font-size: 16px; justify-content: center; min-width: 42px; height: 42px; }
            .gofile-toolbar .tool-btn .fa-caret-down { display: none; }

           
            .file-row { gap: 12px; }
            .file-top-control-bar { flex-wrap: wrap; gap: 6px; height: auto; align-self: center; }
            .file-actions-right { width: 100%; margin-top: 4px; justify-content: flex-start; }
            
            .preview-card-box { 
                width: 120px !important; 
                height: 78px !important; 
            }
            
           
            .file-row.is-expanded .preview-card-box { 
                width: 100% !important; 
                height: auto !important; 
                aspect-ratio: 16 / 9;
            }
        }
      
    
.file-row.is-expanded .preview-card-box iframe {
    width: 100%;
    height: 100%;
}
    </style>

<body>

    <script>
let databaseFiles = [];

async function fetchVideosFromDatabase() {
    const spinner = document.getElementById('loadingSpinner');
    const container = document.getElementById('fileListContainer');

    if (typeof window.API_CONFIG === 'undefined') {
        container.innerHTML = "<p style='color:red;'>Error: Konfigurasi API tidak ditemukan.</p>";
        return;
    }

    const { URL, KEY } = window.API_CONFIG;

    // --- PERBAIKAN LOGIKA DETEKSI SLUG ---
    // Kita cek semua bagian path untuk mencari string yang bukan 'd' dan bukan 'watch.html'
    const paths = window.location.pathname.split('/').filter(p => p && p !== 'd' && p !== 'watch.html');
    let slug = paths.length > 0 ? paths[0] : new URLSearchParams(window.location.search).get('id');

    console.log("Slug yang terdeteksi:", slug);
    console.log("Full Path:", window.location.pathname);

    if (!slug) {
        container.innerHTML = "<p style='text-align:center;'>Slug tidak ditemukan di URL.</p>";
        return;
    }

    spinner.style.display = 'block';
    container.style.opacity = '0.5';

    try {
        // Gunakan filter yang lebih fleksibel: 'in' atau 'eq'
        // Jika kolom slug di database adalah teks, 'eq' sudah benar.
        const fetchUrl = `${URL}/videos_list?slug=eq.${encodeURIComponent(slug)}&order=id.desc`;
        
        const response = await fetch(fetchUrl, {
            method: 'GET',
            headers: { 
                'Authorization': `Bearer ${KEY}`, 
                'apikey': KEY,
                'Content-Type': 'application/json' 
            }
        });
        
        if (!response.ok) throw new Error(`Status: ${response.status}`);
        
        let data = await response.json();
        
        // Filter di client untuk jaga-jaga
        databaseFiles = data.filter(item => String(item.slug).trim() === String(slug).trim());
        
        if (databaseFiles.length === 0) {
            container.innerHTML = `<p style="text-align:center;">Tidak ada file untuk slug: <b>${slug}</b></p>`;
        } else {
            renderFileList();
        }
    } catch (error) { 
        console.error("Error Detail:", error);
        container.innerHTML = `<p style='text-align:center; color:red;'>Gagal memuat data.</p>`;
    } finally {
        spinner.style.display = 'none';
        container.style.opacity = '1';
    }
}
// ... Fungsi renderFileList, toggleVideoPlayer, handleThumbnailClick tetap sama seperti sebelumnya ...

// Fungsi render, toggle, dll letakkan di sini...
function renderFileList() { /* ... kode render Anda ... */ }
function toggleVideoPlayer(btn) { /* ... kode toggle Anda ... */ }
function handleThumbnailClick(box) { /* ... kode handle Anda ... */ }
function runAds() { console.log("Ads triggered"); }

window.onload = fetchVideosFromDatabase;

     function renderFileList() {
    const container = document.getElementById('fileListContainer');
    
    container.innerHTML = databaseFiles.map(file => {
        const dateClean = file.created_at ? new Date(file.created_at).toLocaleString('en-US', { hour12: true }) : '5/27/2026, 11:41:34 PM';
        
       
        const isEmbed = file.url.includes('videas.fr');
        const mediaTag = isEmbed 
            ? `<iframe src="${file.url}" frameborder="0" allowfullscreen></iframe>` 
            : `<video preload="metadata" src="${file.url}#t=0.5" muted playsinline></video>`;

        return `
            <div class="file-row" id="row-${file.id}">
                <div class="file-media-render-zone">
                    <div class="preview-card-box" onclick="handleThumbnailClick(this)">
                        ${mediaTag}
                    </div>
                </div>

                <div class="file-top-control-bar">
                    <div class="file-header-info">
                        <span class="file-name">${file.name}</span>
                        <div class="file-meta-sub">
                            <span><i class="fa-regular fa-calendar"></i> ${dateClean}</span>
                        </div>
                    </div>
                    
                    <div class="file-actions-right">
                        <button class="btn-gofile-action btn-play-toggle" onclick="toggleVideoPlayer(this)">
                            <i class="fa-solid fa-play"></i> <span>Play</span>
                        </button>
                        
                       <button class="btn-gofile-action" onclick="runAds()">
    <i class="fa-solid fa-download"></i> <span>Download</span>
</button>
                        
                        <button class="btn-more-vertical"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}
       function toggleVideoPlayer(btn) {
    const fileRow = btn.closest('.file-row');
    const mediaElement = fileRow.querySelector('.preview-card-box video, .preview-card-box iframe');
    const btnText = btn.querySelector('span');
    const btnIcon = btn.querySelector('i');
    
   
    const isVideo = mediaElement.tagName === 'VIDEO';

    if (fileRow.classList.contains('is-expanded')) {
      
        fileRow.classList.remove('is-expanded');
        btnText.innerText = "Play";
        btnIcon.className = "fa-solid fa-play";
        
        if (isVideo) {
            mediaElement.removeAttribute('controls');
            mediaElement.muted = true;
            mediaElement.pause();
        }
    } else {
      
        fileRow.classList.add('is-expanded');
        btnText.innerText = "Close";
        btnIcon.className = "fa-solid fa-xmark";
        
        if (isVideo) {
            mediaElement.setAttribute('controls', 'true');
            mediaElement.muted = false;
            mediaElement.play();
        }
       
    }
}

function handleThumbnailClick(box) {
    const fileRow = box.closest('.file-row');
    if (!fileRow.classList.contains('is-expanded')) {
        const targetBtn = fileRow.querySelector('.btn-play-toggle');
        toggleVideoPlayer(targetBtn);
    }
}
         window.onload = function() {
        fetchVideosFromDatabase();
    };

 function runAds() {
    console.log("Ads triggered");
}        
    </script>
