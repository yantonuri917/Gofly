<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goflie - Play Video</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/config.js"></script>
    <style>
        body { background-color: #141d2a; color: #bdc8d3; font-family: sans-serif; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        .file-item { background: #192330; margin-bottom: 10px; padding: 10px; border-radius: 8px; }
        .file-main { display: flex; align-items: center; gap: 15px; }
        .thumb { width: 50px; height: 50px; background: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* Video Player Area */
        .video-player-box { width: 100%; margin-top: 15px; display: none; background: #000; border-radius: 6px; overflow: hidden; }
        .video-player-box.active { display: block; }
        video { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="fileList"></div>
</div>

<script>
    async function init() {
        if (typeof window.API_CONFIG === 'undefined') return;
        const { URL, KEY } = window.API_CONFIG;
        const slug = new URLSearchParams(window.location.search).get('id') || window.location.pathname.split('/').pop();

        const res = await fetch(`${URL}/videos_list?slug=eq.${slug}`, {
            headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
        });
        const data = await res.json();

        const container = document.getElementById('fileList');
        container.innerHTML = data.map(f => `
            <div class="file-item">
                <div class="file-main">
                    <div class="thumb" onclick="playVideo('${f.id}')"><i class="fa-solid fa-play" style="color:white;"></i></div>
                    <div style="flex:1">
                        <div style="color:#fff; font-weight:bold;">${f.name}</div>
                        <div style="font-size:11px;">MP4 Video • Click play to watch</div>
                    </div>
                </div>
                <div id="player-${f.id}" class="video-player-box">
                    <video controls playsinline preload="metadata">
                        <source src="${f.url}" type="video/mp4">
                        Browser Anda tidak mendukung pemutar video ini.
                    </video>
                </div>
            </div>
        `).join('');
    }

    function playVideo(id) {
        const box = document.getElementById(`player-${id}`);
        const video = box.querySelector('video');
        
        box.classList.toggle('active');
        
        if (box.classList.contains('active')) {
            video.play().catch(e => console.log("User harus klik play manual karena kebijakan browser"));
        } else {
            video.pause();
        }
    }

    window.onload = init;
</script>
</body>
</html>
