<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Media Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Gaya Visual Gofile */
        body { background-color: #141d2a; color: #bdc8d3; font-family: -apple-system, sans-serif; margin: 0; }
        .workspace { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .folder-root-info { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
        .folder-large-icon { font-size: 42px; color: #f59f00; position: relative; }
        .folder-large-badge { position: absolute; bottom: 0; left: -4px; background: #2b3a4a; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 10px; }
        
        /* Layout File */
        .file-list-container { display: flex; flex-direction: column; gap: 16px; }
        .file-row { background: #192330; border: 1px solid #222f3e; border-radius: 6px; padding: 16px; display: flex; flex-direction: column; gap: 15px; }
        .media-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 6px; overflow: hidden; }
        video, iframe { width: 100%; height: 100%; border: none; }
        
        /* Kontrol */
        .file-actions { display: flex; justify-content: space-between; align-items: center; }
        .btn-action { background: #1877f2; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-size: 14px; font-weight: 600; }
    
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1877f2; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="workspace">
    <div class="folder-root-info">
        <div class="folder-large-icon">
            <i class="fa-solid fa-folder"></i>
            <span class="folder-large-badge" id="countBadge">0</span>
        </div>
        <div class="folder-title">
            <h2 id="folderName">Loading...</h2>
            <p id="dateStamp"></p>
        </div>
    </div>

    <div class="file-list-container" id="fileListContainer">
        <div class="spinner"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE";

    // Ambil slug dari URL path
    const slug = window.location.pathname.split('/').pop();

    async function loadData() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list?slug=eq.${slug}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const data = await res.json();
        const container = document.getElementById('fileListContainer');
        const countBadge = document.getElementById('countBadge');
        
        document.getElementById('dateStamp').innerText = new Date().toLocaleString();
        document.getElementById('folderName').innerText = slug || "Root";
        countBadge.innerText = data.length;

        if (data.length > 0) {
            container.innerHTML = data.map(file => `
                <div class="file-row">
                    <div class="media-box">
                        ${file.url.includes('videas.fr') 
                            ? `<iframe src="${file.url}" allowfullscreen></iframe>` 
                            : `<video src="${file.url}" controls playsinline></video>`}
                    </div>
                    <div class="file-actions">
                        <span style="font-weight:600">${file.name}</span>
                        <a href="${file.url}" download class="btn-action">Download</a>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = `<div style="text-align:center; padding:40px; color:#627d98;"><i class="fa-solid fa-file-lines"></i> No items to display</div>`;
        }
    }

    loadData();
</script>
</body>
</html>
