  <script>
    let databaseFiles = [];

    document.addEventListener('DOMContentLoaded', () => {
        fetchVideosFromDatabase();
    });

    async function fetchVideosFromDatabase() {
        const container = document.getElementById('fileListContainer');
        const spinner = document.getElementById('loadingSpinner');

        if (typeof window.API_CONFIG === 'undefined') {
            container.innerHTML = "<p style='text-align:center; color:red;'>Konfigurasi API tidak ditemukan.</p>";
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('id') || "default-slug"; // Sesuaikan logika slug Anda

        if (spinner) spinner.style.display = 'block';

        try {
            const { URL, KEY } = window.API_CONFIG;
            const response = await fetch(`${URL}/videos_list?slug=eq.${encodeURIComponent(slug)}&order=id.desc`, {
                headers: { 'Authorization': `Bearer ${KEY}`, 'apikey': KEY }
            });
            
            databaseFiles = await response.json();
            renderFileList();
        } catch (error) {
            console.error("Gagal memuat:", error);
        } finally {
            if (spinner) spinner.style.display = 'none';
        }
    }

  function renderFileList() {
    const container = document.getElementById('fileListContainer');
    if (!container) return;
    
    container.innerHTML = databaseFiles.map(file => `
        <div class="file-row" id="row-${file.id}">
            <div class="top-action-anchor"></div> <div class="media-display-area">
                <div class="preview-box" data-video="${file.url}" onclick="handleThumbnailClick(this)">
                    <video src="${file.url}#t=0.5" muted playsinline></video>
                </div>
            </div>
            <div class="file-info-container">
                <div class="file-details">
                    <div class="file-name" data-full="${file.name}" data-short="${file.name.substring(0, 15)}...">
                        ${file.name}
                    </div>
                </div>
                <div class="side-action-box">
                    <div class="action-buttons">
                        <button class="btn-action play-trigger" onclick="handlePlay(this)">Play</button>
                        <button class="btn-action close-trigger" onclick="handleClose(this)">Close</button>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}
       function toggleVideoPlayer(btn) {
    const fileRow = btn.closest('.file-row');
    const mediaElement = fileRow.querySelector('.preview-card-box video, .preview-card-box iframe');
    const btnText = btn.querySelector('span');
    const btnIcon = btn.querySelector('i');
    
   
    const isVideo = mediaElement.tagName === 'VIDEO';

    if (fileRow.classList.contains('is-expanded')) {
      
        fileRow.classList.remove('is-expanded');
        btnText.innerText = "Play";
        btnIcon.className = "fa-solid fa-play";
        
        if (isVideo) {
            mediaElement.removeAttribute('controls');
            mediaElement.muted = true;
            mediaElement.pause();
        }
    } else {
      
        fileRow.classList.add('is-expanded');
        btnText.innerText = "Close";
        btnIcon.className = "fa-solid fa-xmark";
        
        if (isVideo) {
            mediaElement.setAttribute('controls', 'true');
            mediaElement.muted = false;
            mediaElement.play();
        }
       
    }
}

function handleThumbnailClick(box) {
    const fileRow = box.closest('.file-row');
    if (!fileRow.classList.contains('is-expanded')) {
        const targetBtn = fileRow.querySelector('.btn-play-toggle');
        toggleVideoPlayer(targetBtn);
    }
}

        function isDesktop() {
            return window.innerWidth >= 992;
        }

        function toggleSidebar() {
            if (isDesktop()) return;

            const sidebar = document.getElementById('sidebarMenu');
            const overlay = document.getElementById('sidebarOverlay');
            const adContainer = document.getElementById('adContainer');
            const sidebarAdAnchor = document.getElementById('sidebarAdAnchor');
            const headerContainer = document.getElementById('headerContainer');
            
            sidebar.classList.toggle('is-open');
            overlay.classList.toggle('is-visible');

            if (sidebar.classList.contains('is-open')) {
                sidebarAdAnchor.appendChild(adContainer);
            } else {
                headerContainer.appendChild(adContainer);
            }
        }

        window.addEventListener('resize', function() {
            const sidebar = document.getElementById('sidebarMenu');
            const overlay = document.getElementById('sidebarOverlay');
            const adContainer = document.getElementById('adContainer');
            const headerContainer = document.getElementById('headerContainer');

            if (isDesktop()) {
                headerContainer.appendChild(adContainer);
                sidebar.classList.add('is-open');
                overlay.classList.remove('is-visible');
            }
        });

       
        function getFileRowScope(element) {
            return element.closest('.file-row');
        }

        function handleThumbnailClick(previewBox) {
            const fileRow = getFileRowScope(previewBox);
            if (!fileRow.classList.contains('is-playing')) {
                const playBtn = fileRow.querySelector('.play-trigger');
                handlePlay(playBtn);
            }
        }

        function handlePlay(btnElement) {
            const fileRow = getFileRowScope(btnElement);
            const videoElement = fileRow.querySelector('video');
            const previewBox = fileRow.querySelector('.preview-box');
            const actionButtons = fileRow.querySelector('.action-buttons');
            const topActionAnchor = fileRow.querySelector('.top-action-anchor');
            const fileNameText = fileRow.querySelector('.file-name');
            const originalVideoURL = previewBox.getAttribute('data-video');

            fileRow.classList.add('is-playing');
            fileNameText.innerText = fileNameText.getAttribute('data-short');

            videoElement.setAttribute('controls', 'true');
            videoElement.src = originalVideoURL;
            videoElement.play();

            topActionAnchor.appendChild(actionButtons);
        }

        function handleClose(btnElement) {
            const fileRow = getFileRowScope(btnElement);
            const videoElement = fileRow.querySelector('video');
            const previewBox = fileRow.querySelector('.preview-box');
            const actionButtons = fileRow.querySelector('.action-buttons');
            const sideActionBox = fileRow.querySelector('.side-action-box');
            const fileNameText = fileRow.querySelector('.file-name');
            const originalVideoURL = previewBox.getAttribute('data-video');

            fileRow.classList.remove('is-playing');
            fileNameText.innerText = fileNameText.getAttribute('data-full');

            videoElement.pause();
            videoElement.removeAttribute('controls');
            videoElement.src = originalVideoURL + "#t=0.5";
            videoElement.load();

            sideActionBox.appendChild(actionButtons);
        }
    </script>
