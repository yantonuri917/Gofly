<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Media Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #141d2a; color: #bdc8d3; font-family: sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Header Folder */
        .folder-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .folder-icon { font-size: 32px; color: #f59f00; position: relative; }
        .badge { position: absolute; bottom: 0; left: -2px; background: #2b3a4a; color: white; font-size: 10px; padding: 1px 5px; border-radius: 10px; border: 2px solid #141d2a; }
        .folder-title { font-weight: 700; color: white; }

        /* File Row */
        .file-item { background: #192330; border: 1px solid #222f3e; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
        .file-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .file-name { font-weight: 600; color: white; font-size: 14px; }
        .file-meta { font-size: 12px; color: #8899a6; }
        
        /* Video Player */
        .media-box { width: 100%; background: #000; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        video, img { width: 100%; display: block; }
        
        /* Buttons */
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn { background: #202c3c; border: 1px solid #34495e; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="folder-header">
        <div class="folder-icon"><i class="fa-solid fa-folder"></i><span class="badge" id="countBadge">0</span></div>
        <div>
            <div class="folder-title">root</div>
            <div style="font-size: 12px;">28/5/2026, 10.24.18</div>
        </div>
    </div>

    <div id="fileList"></div>
</div>

<script>
    const SUPABASE_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE";

    async function loadFiles() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const data = await res.json();
        const list = document.getElementById('fileList');
        document.getElementById('countBadge').innerText = data.length;
        
        list.innerHTML = data.map(item => `
            <div class="file-item">
                <div class="file-info">
                    <i class="fa-solid ${item.url.match(/\.(mp4|mkv|webm)$/) ? 'fa-file-video' : 'fa-file-image'}" style="color:#5696d7; font-size:20px;"></i>
                    <div>
                        <div class="file-name">${item.name}</div>
                        <div class="file-meta">${new Date(item.created_at).toLocaleDateString()}</div>
                    </div>
                </div>
                <div class="media-box">
                    ${item.url.match(/\.(mp4|mkv|webm)$/) 
                        ? `<video src="${item.url}" controls></video>` 
                        : `<img src="${item.url}" alt="image">`}
                </div>
                <div class="btn-group">
                    <button class="btn" onclick="this.parentElement.previousElementSibling.querySelector('video')?.play()">Play</button>
                    <button class="btn" onclick="window.open('${item.url}')">Download</button>
                    <button class="btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
            </div>
        `).join('');
    }
    loadFiles();
</script>
</body>
</html>
