<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Media Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #141d2a; color: #bdc8d3; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }

        /* Container File */
        .file-item { background: #192330; border: 1px solid #222f3e; border-radius: 6px; padding: 10px; margin-bottom: 15px; }
        
        /* Thumbnail Kecil */
        .preview-box { 
            width: 120px; /* Ukuran Thumbnail Kecil */
            height: 70px; 
            background: #000; 
            border-radius: 4px; 
            overflow: hidden; 
            cursor: pointer; 
            position: relative;
            transition: all 0.3s ease; /* Efek halus saat membesar */
            display: flex; align-items: center; justify-content: center;
        }

        /* Saat di-play, berubah jadi besar */
        .preview-box.is-playing {
            width: 100%; /* Menjadi lebar penuh */
            height: auto;
            aspect-ratio: 16/9;
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        .play-icon { position: absolute; font-size: 24px; color: white; opacity: 0.7; }
        .is-playing .play-icon { display: none; }
    </style>
</head>
<body>

<div class="container" id="fileList"></div>

<script>
    const SUPABASE_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE";

    async function loadFiles() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const data = await res.json();
        const list = document.getElementById('fileList');
        
        list.innerHTML = data.map(item => `
            <div class="file-item">
                <div style="display:flex; gap:15px; align-items:center;">
                    <div class="preview-box" onclick="expandAndPlay(this)">
                        <video src="${item.url}#t=0.5" muted></video>
                        <div class="play-icon"><i class="fa-solid fa-play"></i></div>
                    </div>
                    <div class="file-info">
                        <div style="color:white; font-size:14px; font-weight:600;">${item.name}</div>
                        <div style="font-size:11px;">${item.size || 'Video File'}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function expandAndPlay(el) {
        el.classList.add('is-playing');
        const video = el.querySelector('video');
        video.setAttribute('controls', 'true');
        video.muted = false;
        video.play();
    }

    loadFiles();
</script>
</body>
</html>
