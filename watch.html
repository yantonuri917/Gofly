<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Goflie - Watch</title>
    <script src="config.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .file-row { background: white; margin-bottom: 10px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        iframe, video { width: 100%; max-height: 400px; display: none; margin-top: 10px; }
        .is-expanded iframe, .is-expanded video { display: block; }
    </style>
</head>
<body>

    <div id="loadingSpinner" style="display:none;"><div class="spinner"></div></div>
    <div id="fileListContainer"></div>

    <script>
        async function fetchVideos() {
            const container = document.getElementById('fileListContainer');
            
            // 2. Tunggu sampai API_CONFIG benar-benar terbaca
            let attempts = 0;
            while (typeof window.API_CONFIG === 'undefined' && attempts < 10) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }

            if (typeof window.API_CONFIG === 'undefined') {
                container.innerHTML = "<p style='color:red;'>Error: config.js gagal dimuat.</p>";
                return;
            }

            const { URL, KEY } = window.API_CONFIG;
            
            // 3. Deteksi Slug
            const paths = window.location.pathname.split('/').filter(p => p && p !== 'd' && p !== 'watch.html');
            let slug = paths.length > 0 ? paths[0] : new URLSearchParams(window.location.search).get('id');

            if (!slug) {
                container.innerHTML = "<p>Slug tidak ditemukan.</p>";
                return;
            }

            try {
                const response = await fetch(`${URL}/videos_list?slug=eq.${encodeURIComponent(slug)}`, {
                    headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.length === 0) {
                    container.innerHTML = `<p>Tidak ada data untuk slug: ${slug}</p>`;
                } else {
                    renderUI(data);
                }
            } catch (error) {
                container.innerHTML = `<p style='color:red;'>Error: ${error.message}</p>`;
            }
        }

        function renderUI(files) {
            document.getElementById('fileListContainer').innerHTML = files.map(file => `
                <div class="file-row">
                    <h3>${file.name}</h3>
                    <div class="preview-card-box" onclick="this.parentElement.classList.toggle('is-expanded')">
                        ${file.url.includes('videas.fr') 
                            ? `<iframe src="${file.url}" frameborder="0" allowfullscreen></iframe>` 
                            : `<video src="${file.url}" playsinline></video>`}
                    </div>
                </div>
            `).join('');
        }

        window.onload = fetchVideos;
    </script>
</body>
</html>
