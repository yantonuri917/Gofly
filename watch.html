         <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gofile - Watch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/config.js?v=1.0"></script>
    <style>
        /* CSS Anda tetap sama seperti yang Anda berikan sebelumnya */
        body { background-color: #141d2a; color: #bdc8d3; margin: 0; font-family: sans-serif; }
        .workspace { padding: 20px; }
        .file-row { background: #192330; margin-bottom: 10px; padding: 15px; border-radius: 8px; border-bottom: 1px solid #222f3e; }
        .preview-card-box { width: 100%; max-width: 720px; background: #000; border-radius: 6px; cursor: pointer; overflow: hidden; }
        video, iframe { width: 100%; display: none; aspect-ratio: 16/9; }
        .is-expanded video, .is-expanded iframe { display: block; }
        .spinner { text-align: center; padding: 50px; font-size: 30px; color: #1877f2; }
    </style>
</head>
<body>

<div class="workspace">
    <div id="loadingSpinner" class="spinner" style="display: none;"><i class="fa-solid fa-spinner fa-spin"></i></div>
    <div id="fileListContainer"></div>
</div>

<script>
    let databaseFiles = [];

    // FUNGSI UTAMA (Inisialisasi)
    async function initApp() {
        if (typeof window.API_CONFIG === 'undefined') {
            document.body.innerHTML = "<h2 style='color:red; text-align:center;'>Error: config.js gagal dimuat!</h2>";
            return;
        }

        // Ambil slug dari URL path (/d/abcde) atau parameter (?id=abcde)
        const paths = window.location.pathname.split('/').filter(p => p && p !== 'd' && p !== 'watch.html');
        let slug = paths.length > 0 ? paths[0] : new URLSearchParams(window.location.search).get('id');

        if (!slug) {
            document.getElementById('fileListContainer').innerHTML = "<p style='text-align:center;'>Folder tidak ditemukan.</p>";
            return;
        }

        await fetchVideos(slug);
    }

    async function fetchVideos(slug) {
        const spinner = document.getElementById('loadingSpinner');
        const container = document.getElementById('fileListContainer');
        const { URL, KEY } = window.API_CONFIG;

        spinner.style.display = 'block';

        try {
            const response = await fetch(`${URL}/videos_list?slug=eq.${encodeURIComponent(slug)}&order=id.desc`, {
                headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' }
            });
            
            databaseFiles = await response.json();
            renderFileList();
        } catch (error) {
            container.innerHTML = `<p style='text-align:center; color:red;'>Error: ${error.message}</p>`;
        } finally {
            spinner.style.display = 'none';
        }
    }

    function renderFileList() {
        const container = document.getElementById('fileListContainer');
        if (databaseFiles.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>Data kosong atau slug salah.</p>";
            return;
        }

        container.innerHTML = databaseFiles.map(file => `
            <div class="file-row">
                <div class="preview-card-box" onclick="toggleVideo(this)">
                    ${file.url.includes('videas.fr') 
                        ? `<iframe src="${file.url}" frameborder="0" allowfullscreen></iframe>` 
                        : `<video src="${file.url}" playsinline></video>`}
                </div>
                <h3>${file.name}</h3>
                <button onclick="toggleVideo(this.previousElementSibling.previousElementSibling)">Play / Close</button>
            </div>
        `).join('');
    }

    function toggleVideo(el) {
        const row = el.closest('.file-row');
        row.classList.toggle('is-expanded');
        const media = row.querySelector('video, iframe');
        if(media && media.tagName === 'VIDEO') {
            row.classList.contains('is-expanded') ? media.play() : media.pause();
        }
    }

    window.onload = initApp;
</script>
</body>
</html>
