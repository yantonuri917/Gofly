<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Media Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #141d2a; color: #bdc8d3; display: flex; min-height: 100vh; margin: 0; font-family: sans-serif; }
        aside { width: 240px; background-color: #192330; border-right: 1px solid #222f3e; padding: 20px 14px; }
        .workspace { flex: 1; display: flex; flex-direction: column; }
        .top-navbar { height: 60px; background-color: #192330; border-bottom: 1px solid #222f3e; display: flex; align-items: center; padding: 0 24px; }
        main { padding: 24px; max-width: 1000px; width: 100%; margin: 0 auto; }
        
        /* Layout Folder & Toolbar */
        .folder-root-info { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
        .folder-large-icon { font-size: 42px; color: #f59f00; position: relative; }
        .gofile-toolbar { display: flex; gap: 8px; border-bottom: 1px solid #222f3e; padding-bottom: 16px; margin-bottom: 20px; }
        .tool-btn { background: #202c3c; color: #ced5e0; border: 1px solid #2d3d52; padding: 7px 14px; border-radius: 4px; cursor: pointer; }
        
        /* Layout Video */
        .file-list-container { display: flex; flex-direction: column; gap: 16px; }
        .file-row { background: #192330; border: 1px solid #222f3e; border-radius: 6px; padding: 16px; }
        .media-box { width: 100%; aspect-ratio: 16/9; background: #000; margin-bottom: 10px; }
        video, iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <aside>
        <div class="brand-logo" style="color:white; font-weight:800; font-size:22px; margin-bottom:24px;">
            <i class="fa-solid fa-paper-plane" style="color: #f59f00;"></i> Gofile
        </div>
        <ul style="list-style:none;">
            <li style="padding:10px; color:#fff; background:#202c3c; border-radius:6px;"><i class="fa-solid fa-house"></i> Home</li>
        </ul>
    </aside>

    <div class="workspace">
        <header class="top-navbar"><i class="fa-solid fa-bars"></i></header>
        <main>
            <div class="folder-root-info">
                <div class="folder-large-icon">
                    <i class="fa-solid fa-folder"></i>
                    <span class="folder-large-badge" id="countBadge" style="font-size:10px; background:#2b3a4a; padding:1px 5px; border-radius:10px;">0</span>
                </div>
                <div>
                    <h2 id="folderTitle">root</h2>
                    <p style="color:#627d98; font-size:12px;">Public folder</p>
                </div>
            </div>

            <div class="gofile-toolbar">
                <button class="tool-btn"><i class="fa-solid fa-share-nodes"></i></button>
                <button class="tool-btn"><i class="fa-solid fa-cloud-arrow-up"></i></button>
            </div>

            <div class="file-list-container" id="fileListContainer">
                </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE";
        
        async function loadData() {
            const slug = window.location.pathname.split('/').pop();
            const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list?slug=eq.${slug}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            
            const container = document.getElementById('fileListContainer');
            document.getElementById('countBadge').innerText = data.length;

            if (data.length > 0) {
                container.innerHTML = data.map(file => `
                    <div class="file-row">
                        <div class="media-box">
                            ${file.url.includes('videas.fr') ? `<iframe src="${file.url}"></iframe>` : `<video src="${file.url}" controls></video>`}
                        </div>
                        <div style="font-weight:600;">${file.name}</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#627d98;"><i class="fa-solid fa-file-lines"></i> No items to display</div>`;
            }
        }
        loadData();
    </script>
</body>
</html>
