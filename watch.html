<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Media Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #141d2a; color: #bdc8d3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Animasi Spinner */
        .spinner-wrapper { display: flex; justify-content: center; padding: 50px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #1877f2; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Gaya yang ada sebelumnya */
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .folder-icon { font-size: 32px; color: #f59f00; position: relative; }
        .badge { position: absolute; bottom: 0; left: -2px; background: #2b3a4a; color: white; font-size: 10px; padding: 1px 5px; border-radius: 10px; border: 2px solid #141d2a; }
        .folder-title { font-weight: 700; color: white; font-size: 18px; }
        .file-item { background: #192330; border: 1px solid #222f3e; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
        .file-header { display: flex; gap: 10px; margin-bottom: 10px; }
        .file-info { flex: 1; }
        .file-name { color: white; font-weight: 600; font-size: 14px; word-break: break-all; }
        .file-meta { font-size: 12px; color: #8899x6; }
        .media-container { width: 100%; margin-top: 10px; background: #000; border-radius: 4px; overflow: hidden; display: flex; justify-content: center; }
        video { width: 100%; max-height: 50vh; outline: none; }
        .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn { background: #202c3c; color: #cbd5e0; border: 1px solid #34495e; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .action-btn { background: #202c3c; border: 1px solid #34495e; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="folder-icon"><i class="fa-solid fa-folder"></i><span class="badge" id="countBadge">0</span></div>
        <div>
            <div class="folder-title">root</div>
            <div class="folder-info" id="dateDisplay">28/5/2026, 10.24.18</div>
        </div>
    </div>

    <div id="fileList">
        <div class="spinner-wrapper"><div class="spinner"></div></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE";

    async function loadFiles() {
        const list = document.getElementById('fileList');
        
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            
            document.getElementById('countBadge').innerText = data.length;
            
            // Render data setelah fetch selesai
            list.innerHTML = data.map(item => `
                <div class="file-item">
                    <div class="file-header">
                        <i class="fa-solid fa-file-video" style="color:#5696d7; font-size:24px;"></i>
                        <div class="file-info">
                            <div class="file-name">${item.name}</div>
                            <div class="file-meta">${new Date(item.created_at).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="media-container">
                        <video src="${item.url}" controls></video>
                    </div>
                    <div class="btn-row" style="margin-top:10px;">
                        <button class="action-btn" onclick="this.parentElement.previousElementSibling.querySelector('video').play()">Play</button>
                        <button class="action-btn" onclick="window.open('${item.url}')">Download</button>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            list.innerHTML = `<div style="text-align:center; padding:20px;">Gagal memuat data.</div>`;
        }
    }
    loadFiles();
</script>

</body>
</html>
