<!DOCTYPE html>
<html lang="id">
<head>
     <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="referrer" content="no-referrer">    
    <title>Gofile - Free file sharing and storage platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <script src="/config.js?v=1.0"></script> 
     <script src="core-init.js"></script>

    <style>

        body { background-color: #141d2a; color: #bdc8d3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 10px; }

        .container { max-width: 600px; margin: 0 auto; }

        

        /* Header Folder */

        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }

        .folder-icon { font-size: 32px; color: #f59f00; position: relative; }

        .badge { position: absolute; bottom: 0; left: -2px; background: #2b3a4a; color: white; font-size: 10px; padding: 1px 5px; border-radius: 10px; border: 2px solid #141d2a; }

        .folder-title { font-weight: 700; color: white; font-size: 18px; }

        .folder-info { font-size: 12px; color: #8899a6; }



        /* File Item */

        .file-item { background: #192330; border: 1px solid #222f3e; border-radius: 6px; padding: 15px; margin-bottom: 15px; }

        .file-header { display: flex; gap: 10px; margin-bottom: 10px; }

        .file-info { flex: 1; }

        .file-name { color: white; font-weight: 600; font-size: 14px; word-break: break-all; }

        .file-meta { font-size: 12px; color: #8899a6; }

        

        /* Media Player */

        .media-container { width: 100%; margin-top: 10px; background: #000; border-radius: 4px; overflow: hidden; display: flex; justify-content: center; }

        video { width: 100%; max-height: 50vh; outline: none; }



        /* Action Buttons */

        .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }

        .btn { background: #202c3c; color: #cbd5e0; border: 1px solid #34495e; padding: 8px 12px; border-radius: 4px; cursor: pointer; }

        .action-btn { background: #202c3c; border: 1px solid #34495e; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

    </style>

</head>

<body>



<div class="container">

    <div class="header">

        <div class="folder-icon"><i class="fa-solid fa-folder"></i><span class="badge" id="countBadge">1</span></div>

        <div>

            <div class="folder-title">root</div>

            <div class="folder-info" id="dateDisplay">28/5/2026, 10.24.18</div>

        </div>

    </div>



    <div class="btn-row">

        <button class="btn" style="background:#2ecc71; color:white; border:none;"><i class="fa-solid fa-share-nodes"></i></button>

        <button class="btn" style="background:#1877f2; color:white; border:none;"><i class="fa-solid fa-folder-plus"></i></button>

        <button class="btn" style="background:#1877f2; color:white; border:none;"><i class="fa-solid fa-upload"></i></button>

        <button class="btn"><i class="fa-solid fa-rotate"></i></button>

    </div>



    <div id="fileList">

        </div>

</div>



<script>
let databaseFiles = [];
         
async function fetchVideosFromDatabase() {
    const spinner = document.getElementById('loadingSpinner');
    const container = document.getElementById('fileListContainer');

   
    if (typeof window.API_CONFIG === 'undefined') {
        console.error("Config tidak ditemukan!");
        container.innerHTML = "<p style='text-align:center; color:red;'>Error: Konfigurasi API tidak ditemukan.</p>";
        return;
    }

    const { URL, KEY } = window.API_CONFIG;

    spinner.style.display = 'block';
    container.style.opacity = '0.5';

    try {
        const response = await fetch(`${URL}/videos_list?order=id.desc`, {
            method: 'GET',
            headers: { 
                'Authorization': `Bearer ${KEY}`, 
                'apikey': KEY,
                'Content-Type': 'application/json' 
            }
        });
        
        if (!response.ok) {
          
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        databaseFiles = await response.json();
        renderFileList();
    } catch (error) { 
        console.error("Detail Error:", error);
        container.innerHTML = `<p style='text-align:center; color:red;'>Gagal memuat: ${error.message}</p>`;
    } finally {
        spinner.style.display = 'none';
        container.style.opacity = '1';
    }
}
     function renderFileList() {
    const container = document.getElementById('fileListContainer');
    
    container.innerHTML = databaseFiles.map(file => {
        const dateClean = file.created_at ? new Date(file.created_at).toLocaleString('en-US', { hour12: true }) : '5/27/2026, 11:41:34 PM';
        
       
        const isEmbed = file.url.includes('videas.fr');
        const mediaTag = isEmbed 
            ? `<iframe src="${file.url}" frameborder="0" allowfullscreen></iframe>` 
            : `<video preload="metadata" src="${file.url}#t=0.5" muted playsinline></video>`;

        return `
            <div class="file-row" id="row-${file.id}">
                <div class="file-media-render-zone">
                    <div class="preview-card-box" onclick="handleThumbnailClick(this)">
                        ${mediaTag}
                    </div>
                </div>

                <div class="file-top-control-bar">
                    <div class="file-header-info">
                        <span class="file-name">${file.name}</span>
                        <div class="file-meta-sub">
                            <span><i class="fa-regular fa-calendar"></i> ${dateClean}</span>
                        </div>
                    </div>
                    
                    <div class="file-actions-right">
                        <button class="btn-gofile-action btn-play-toggle" onclick="toggleVideoPlayer(this)">
                            <i class="fa-solid fa-play"></i> <span>Play</span>
                        </button>
                        
                       <button class="btn-gofile-action" onclick="runAds()">
    <i class="fa-solid fa-download"></i> <span>Download</span>
</button>
                        
                        <button class="btn-more-vertical"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}
       function toggleVideoPlayer(btn) {
    const fileRow = btn.closest('.file-row');
    const mediaElement = fileRow.querySelector('.preview-card-box video, .preview-card-box iframe');
    const btnText = btn.querySelector('span');
    const btnIcon = btn.querySelector('i');
    
   
    const isVideo = mediaElement.tagName === 'VIDEO';

    if (fileRow.classList.contains('is-expanded')) {
      
        fileRow.classList.remove('is-expanded');
        btnText.innerText = "Play";
        btnIcon.className = "fa-solid fa-play";
        
        if (isVideo) {
            mediaElement.removeAttribute('controls');
            mediaElement.muted = true;
            mediaElement.pause();
        }
    } else {
      
        fileRow.classList.add('is-expanded');
        btnText.innerText = "Close";
        btnIcon.className = "fa-solid fa-xmark";
        
        if (isVideo) {
            mediaElement.setAttribute('controls', 'true');
            mediaElement.muted = false;
            mediaElement.play();
        }
       
    }
}

function handleThumbnailClick(box) {
    const fileRow = box.closest('.file-row');
    if (!fileRow.classList.contains('is-expanded')) {
        const targetBtn = fileRow.querySelector('.btn-play-toggle');
        toggleVideoPlayer(targetBtn);
    }
}
         window.onload = function() {
        fetchVideosFromDatabase();
    };

 function runAds() {
    console.log("Ads triggered");
}        
    </script>
     
</body>
</html>
