<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">       
    <title>FileAV - Secured Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background-color: #0b0c10; color: #f3f4f6; font-family: 'Inter', sans-serif; margin: 0; user-select: none; }
        .main-nav { background-color: #0b0c10; border-bottom: 1px solid #1f2937; padding: 0.75rem 1rem; position: sticky; top: 0; z-index: 100; height: 60px; display: flex; align-items: center; justify-content: space-between; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden; cursor: pointer; }
        #mainVideo { width: 100%; height: 100%; object-fit: contain; z-index: 10; }
        
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: rgba(236, 72, 153, 0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; z-index: 50; transition: 0.3s; pointer-events: none; opacity: 0; box-shadow: 0 0 20px rgba(236, 72, 153, 0.5); }
        .play-overlay:hover { background: rgba(219, 39, 119, 1); }
        #mainVideo.paused + .play-overlay { opacity: 1; pointer-events: auto; }

        .custom-controls { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 0 15px 12px; opacity: 0; transition: opacity 0.3s; z-index: 40; }
        .video-wrapper:hover .custom-controls { opacity: 1; }
        .progress-slider { width: 100%; height: 5px; cursor: pointer; accent-color: #ec4899; margin-bottom: 10px; }
        .id-badge { font-size: 11px; font-weight: 900; color: #ec4899; background: rgba(236, 72, 153, 0.1); padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(236, 72, 153, 0.3); }
        .video-card video { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; background: #1a1b23; transition: transform 0.2s; }
        .video-card:hover video { transform: scale(1.02); }
        .page-btn { padding: 8px 16px; border: 1px solid #374151; color: white; cursor: pointer; transition: 0.3s; border-radius: 4px; }
        .page-btn.active { background: #db2777; border-color: #db2777; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="flex items-center gap-2"><div class="bg-pink-600 text-white font-black px-2 py-0.5 rounded text-sm">🎬</div><span class="font-black text-xl tracking-tighter uppercase">File<span class="text-pink-500">av</span></span></div>
    </nav>

    <main class="max-w-5xl mx-auto mt-2">
        <div class="video-wrapper group" id="playerArea" onclick="togglePlay()">
            <video id="mainVideo" preload="metadata" playsinline controlsList="nodownload" oncontextmenu="return false;"></video>
            <div class="play-overlay" id="playOverlay">▶</div>
            <div class="custom-controls" onclick="event.stopPropagation()">
                <input type="range" id="videoSlider" class="progress-slider" min="0" max="100" value="0">
                <div class="flex items-center justify-between pb-1 text-white">
                    <div class="flex items-center gap-4">
                        <button onclick="togglePlay()" id="playBtn" class="text-pink-500 font-black">▶</button>
                        <span id="timeInfo" class="text-xs font-mono">00:00 / 00:00</span>
                    </div>
                    <button onclick="toggleFullscreen()" class="text-lg">⛶</button>
                </div>
            </div>
        </div>

        <div class="p-5"><span id="currentId" class="id-badge">LOADING...</span></div>

        <div class="px-5 pb-20">
            <div class="flex justify-center my-6 overflow-x-auto">
                <script type="text/javascript">
                    atOptions = { 'key' : '64e783bd557c30cbf66293b5c5fda05f', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
                </script>
                <script type="text/javascript" src="https://braverybreezebinding.com/64e783bd557c30cbf66293b5c5fda05f/invoke.js"></script>
            </div>

            <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[3px] mb-6">REKOMENDASI</h2>
            <div id="gridContainer" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
            <div id="paginationContainer" class="flex justify-center gap-2 mt-10 flex-wrap"></div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE"; 
        
        let currentPage = 1;
        const pageSize = 4;

        const video = document.getElementById('mainVideo');
        const videoSlider = document.getElementById('videoSlider');
        const playBtn = document.getElementById('playBtn');
        const gridContainer = document.getElementById('gridContainer');
        const currentId = document.getElementById('currentId');

        async function getTotalPages() {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list?select=count`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Prefer': 'count=exact' }
            });
            const range = res.headers.get('content-range');
            return Math.ceil(parseInt(range.split('/')[1]) / pageSize);
        }

        async function loadVideos(page = 1) {
            currentPage = page;
            const from = (page - 1) * pageSize;
            const to = from + pageSize - 1;

            const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list?select=*&order=created_at.desc&limit=${pageSize}&offset=${from}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            
            gridContainer.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "video-card cursor-pointer";
                card.onclick = () => switchVideo(item);
                card.innerHTML = `<video src="${item.url}" muted></video><div class="flex justify-center mt-2"><span class="id-badge">${item.name}</span></div>`;
                gridContainer.appendChild(card);
            });

            if(page === 1 && data.length > 0) switchVideo(data[0]);
            renderPagination(await getTotalPages());
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('paginationContainer');
            container.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => { loadVideos(i); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                container.appendChild(btn);
            }
        }

        function switchVideo(item) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            video.src = item.url;
            currentId.innerText = item.name;
            video.play();
        }

        function togglePlay() { video.paused ? video.play() : video.pause(); }
        function toggleFullscreen() { !document.fullscreenElement ? document.getElementById('playerArea').requestFullscreen() : document.exitFullscreen(); }

        video.addEventListener('play', () => video.classList.remove('paused'));
        video.addEventListener('pause', () => video.classList.add('paused'));
        video.addEventListener('timeupdate', () => {
            if(!video.duration) return;
            videoSlider.value = (video.currentTime / video.duration) * 100;
            const cur = Math.floor(video.currentTime), dur = Math.floor(video.duration);
            document.getElementById('timeInfo').innerText = `${Math.floor(cur/60)}:${(cur%60).toString().padStart(2,'0')} / ${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
        });

        videoSlider.oninput = () => video.currentTime = (videoSlider.value / 100) * video.duration;
        video.onplay = () => playBtn.innerText = "⏸";
        video.onpause = () => playBtn.innerText = "▶";

        loadVideos(1);
        video.classList.add('paused');
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
