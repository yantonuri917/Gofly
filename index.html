    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            background-color: #0b0c10;
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            margin: 0;

        }

        /* Navigasi */
        .main-nav {
            background-color: #0b0c10;
            border-bottom: 1px solid #1f2937;
            padding: 0.75rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Iklan Sticky */
        .sticky-ads-container {
            position: sticky;
            top: 60px;
            z-index: 90;
            background-color: #0b0c10;
            padding: 5px 0;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: center;
            min-height: 60px;
        }

        /* Video Player */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Controls Overlay */
        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 15px 10px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
        }

        .video-wrapper:hover .controls-overlay,
        .video-wrapper.touch-active .controls-overlay {
            opacity: 1;
        }

        /* Slider / Seek Bar Styling */
        .seek-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            position: relative;
            margin-bottom: 12px;
            border-radius: 3px;
        }

        .seek-container:hover {
            height: 8px;
            margin-bottom: 10px;
        }

        .seek-bar-buffer {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            width: 0%;
            border-radius: 3px;
        }

        .seek-bar-current {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: #ec4899;
            width: 0%;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        /* Handle Bulat saat hover/drag */
        .seek-handle {
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            right: -7px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transform: scale(0);
            transition: transform 0.1s;
        }

        .seek-container:hover .seek-handle,
        .dragging .seek-handle {
            transform: scale(1);
        }

        /* Tombol Play Tengah */
        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 40;
            pointer-events: none;
            opacity: 1;
            transition: all 0.3s;
        }

        .is-playing .center-btn {
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.5);
        }

        .id-badge {
            font-size: 11px;
            font-weight: 900;
            color: #ec4899;
            background: rgba(236, 72, 153, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(236, 72, 153, 0.3);
            display: inline-block;
            letter-spacing: 1.5px;
        }

        .video-card video {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>

    <script>
        const video = document.getElementById('mainVideo');
        const container = document.getElementById('playerContainer');
        const seekContainer = document.getElementById('seekContainer');
        const currentBar = document.getElementById('currentBar');
        const bufferBar = document.getElementById('bufferBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const muteBtn = document.getElementById('muteBtn');
        
        let isDragging = false;

        // Toggle Play
        const togglePlay = () => {
            if (video.paused) {
                video.play();
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>';
                container.classList.add('is-playing');
            } else {
                video.pause();
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"></path>';
                container.classList.remove('is-playing');
            }
        };

        container.onclick = (e) => {
            if (e.target.closest('.controls-overlay')) return;
            togglePlay();
        };
        playBtn.onclick = togglePlay;

        // Update Progress
        video.addEventListener('timeupdate', () => {
            if (!isDragging) {
                const percent = (video.currentTime / video.duration) * 100;
                currentBar.style.width = percent + '%';
                updateTimeText();
            }
        });

        // Update Buffer
        video.addEventListener('progress', () => {
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                const duration = video.duration;
                bufferBar.style.width = (bufferedEnd / duration) * 100 + "%";
            }
        });

        const updateTimeText = () => {
            const format = (s) => {
                let m = Math.floor(s / 60);
                s = Math.floor(s % 60);
                return (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s);
            }
            timeDisplay.innerText = `${format(video.currentTime)} / ${format(video.duration || 0)}`;
        };

        // Slider Logic (Drag & Click)
        const scrub = (e) => {
            const rect = seekContainer.getBoundingClientRect();
            let pos = ((e.clientX || e.touches[0].clientX) - rect.left) / rect.width;
            pos = Math.max(0, Math.min(1, pos));
            currentBar.style.width = (pos * 100) + '%';
            if (isDragging) {
                // Saat ditarik, update waktu video secara real-time
                video.currentTime = pos * video.duration;
            }
        };

        seekContainer.onmousedown = (e) => {
            isDragging = true;
            seekContainer.classList.add('dragging');
            scrub(e);
        };

        window.onmousemove = (e) => {
            if (isDragging) scrub(e);
        };

        window.onmouseup = (e) => {
            if (isDragging) {
                isDragging = false;
                seekContainer.classList.remove('dragging');
                const rect = seekContainer.getBoundingClientRect();
                let pos = (e.clientX - rect.left) / rect.width;
                video.currentTime = Math.max(0, Math.min(1, pos)) * video.duration;
            }
        };

        // Support Sentuhan (Mobile)
        seekContainer.ontouchstart = (e) => {
            isDragging = true;
            scrub(e);
        };
        window.ontouchmove = (e) => {
            if (isDragging) scrub(e);
        };
        window.ontouchend = () => {
            isDragging = false;
        };

        // Mute & Fullscreen
        muteBtn.onclick = () => {
            video.muted = !video.muted;
            document.getElementById('volIcon').style.fill = video.muted ? '#ec4899' : 'currentColor';
        };

        document.getElementById('fsBtn').onclick = () => {
            if (!document.fullscreenElement) container.requestFullscreen();
            else document.exitFullscreen();
        };

        // Playlist
        const data = [
            { id: "URE-138", url: "https://video.twimg.com/amplify_video/2042164168879710209/vid/avc1/480x270/IIt24dL7sEjIHDXo.mp4?tag=21" },
            { id: "SNOS-202", url: "https://video.twimg.com/amplify_video/2042163089920135168/vid/avc1/480x270/D0z6TwOyov8np6tq.mp4?tag=21" },
            { id: "SNOS-199", url: "https://video.twimg.com/amplify_video/2042165236426473472/vid/avc1/480x270/GG5BP66gWnFFu5DZ.mp4?tag=21" },
            { id: "SNOS-190", url: "https://video.twimg.com/amplify_video/2042127001306460160/vid/avc1/480x270/x-XVW7uMw6YfmAlW.mp4?tag=21" },
            { id: "SNOS-185", url: "https://video.twimg.com/amplify_video/2042124734872350721/vid/avc1/480x270/fe5PpvnFL69uIfGG.mp4?tag=21" },
            { id: "SNOS-170", url: "https://video.twimg.com/amplify_video/2041753223560884228/vid/avc1/480x270/9GMN3k6tiVntSZkh.mp4?tag=21" }
        ];

        const grid = document.getElementById('grid');
        data.forEach(v => {
            const div = document.createElement('div');
            div.className = "cursor-pointer group";
            div.onclick = () => {
                window.scrollTo({top: 0, behavior: 'smooth'});
                document.getElementById('videoID').innerText = v.id;
                video.src = v.url;
                video.play();
                container.classList.add('is-playing');
            };
            div.innerHTML = `
                <div class="relative rounded-lg overflow-hidden border border-gray-800 group-hover:border-pink-500 transition-all">
                    <video muted preload="metadata" class="w-full aspect-video object-cover"><source src="${v.url}#t=0.1"></video>
                    <div class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity">
                        <div class="w-10 h-10 bg-pink-600 rounded-full flex items-center justify-center">
                            <svg class="w-5 h-5 fill-white ml-0.5" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                        </div>
                    </div>
                </div>
                <div class="mt-2 text-center"><span class="id-badge">${v.id}</span></div>
            `;
            grid.appendChild(div);
        });
    </script>
