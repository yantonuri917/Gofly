<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile Interface - Public Video List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================== CORE RESET & BASE ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #182436;
            color: #f4f6f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        header {
            padding: 12px 16px;
            border-bottom: 1px solid #23334a;
            display: flex;
            align-items: center;
        }

        .menu-btn {
            background-color: #1d68d5;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        /* ==================== SIDEBAR MENU ==================== */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: #151f2c;
            z-index: 1000;
            transition: left 0.3s ease;
            padding: 20px 16px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        }

        .sidebar.is-open { left: 0; }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .sidebar-overlay.is-visible { display: block; }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: bold;
            color: white;
        }

        .brand i { color: #f1b418; font-size: 24px; }

        .close-sidebar-btn {
            background: #23334a;
            color: #4b8bf4;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==================== MAIN KONTEN UTAMA ==================== */
        main {
            flex: 1;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .folder-section { margin-bottom: 16px; }
        .folder-header { display: flex; align-items: flex-start; gap: 12px; }
        
        .folder-icon-container {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .folder-icon-container .fa-folder { font-size: 46px; color: #f3b007; }
        .folder-icon-container::after {
            content: ""; position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%);
            width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent;
            border-bottom: 10px solid #182436;
        }

        .folder-badge {
            position: absolute; bottom: -2px; right: -4px; background-color: #475971;
            color: white; font-size: 11px; font-weight: bold; padding: 1px 6px;
            border-radius: 10px; border: 2px solid #182436; z-index: 2;
        }

        .folder-meta h2 { font-size: 16px; font-weight: 600; }
        .folder-meta p { font-size: 12px; color: #798b9e; margin-top: 2px; }

        /* Toolbar & Upload Input Hidden */
        .main-toolbar {
            display: flex; gap: 8px; align-items: center;
            border-bottom: 1px solid #23334a; padding-bottom: 16px; margin-bottom: 16px;
        }

        .btn-tool {
            color: white; border: none; padding: 8px 12px; border-radius: 4px;
            cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
        }
        .btn-tool.blue { background-color: #1d68d5; }

        /* Status Loading Bar */
        .upload-progress-container {
            background-color: #151f2c; border: 1px solid #23334a;
            border-radius: 6px; padding: 12px; margin-bottom: 16px; display: none;
        }
        .progress-bar-bg {
            background-color: #23334a; width: 100%; height: 8px;
            border-radius: 4px; overflow: hidden; margin-top: 8px;
        }
        .progress-bar-fill {
            background-color: #24a148; width: 0%; height: 100%; transition: width 0.2s;
        }

        /* ==================== FILE ROW DATA ==================== */
        .file-list-container { display: flex; flex-direction: column; }

        .file-row {
            display: flex; flex-direction: column;
            border-bottom: 1px solid #23334a; padding-bottom: 16px; margin-bottom: 16px;
        }

        .file-info-container { display: flex; gap: 12px; align-items: flex-start; }
        .file-left-controls { display: flex; flex-direction: column; align-items: center; gap: 12px; padding-top: 4px; }
        .file-icon { font-size: 20px; color: #4b8bf4; }
        .file-details { flex: 1; }
        .file-name { font-size: 14px; font-weight: 600; color: #f4f6f8; margin-bottom: 4px; word-break: break-all; }
        .file-specs { font-size: 12px; color: #798b9e; }

        .media-display-area { margin-top: 12px; margin-left: 28px; display: flex; }
        
        .preview-box {
            width: 180px; height: 120px; background-color: #0b131e;
            border-radius: 4px; overflow: hidden; display: flex;
            align-items: center; justify-content: center; cursor: pointer; position: relative;
        }
        .preview-box video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .preview-box .click-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

        .inline-actions { display: flex; align-items: flex-start; margin-left: 12px; }
        .action-group { display: flex; gap: 6px; align-self: flex-start; }
        
        .btn-action {
            background-color: transparent; color: #a2b0c3; border: 1px solid #33445c;
            width: 32px; height: 32px; border-radius: 4px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }
        .btn-action.close-trigger { display: none; }

        /* PLAYING STATE */
        .file-row.is-playing .inline-actions { display: none; }
        .file-row.is-playing .preview-box .click-overlay { display: none; }
        .file-row.is-playing .btn-action.play-trigger { display: none; }
        .file-row.is-playing .btn-action.close-trigger { display: flex; }
        .file-row.is-playing .media-display-area { margin-left: 0; width: 100%; }
        .file-row.is-playing .preview-box { width: 100%; height: 320px; cursor: default; }
        .file-row.is-playing .preview-box video { pointer-events: auto; }

        .pagination-text { text-align: center; font-size: 12px; color: #798b9e; margin: 24px 0; }
        footer { border-top: 1px solid #23334a; padding: 24px 16px; text-align: center; font-size: 12px; color: #58697d; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebarMenu">
        <div class="sidebar-header">
            <div class="brand"><i class="fa-solid fa-folder-open"></i> Gofile</div>
            <button class="close-sidebar-btn" onclick="toggleSidebar()"><i class="fa-solid fa-chevron-left"></i></button>
        </div>
        <ul class="sidebar-menu" style="list-style:none; padding-top:20px;">
            <li><a href="#" style="color:#a2b0c3; text-decoration:none;"><i class="fa-solid fa-house"></i> Home</a></li>
        </ul>
    </aside>

    <header>
        <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    </header>

    <main>
        <div class="folder-section">
            <div class="folder-header">
                <div class="folder-icon-container">
                    <i class="fa-solid fa-folder"></i>
                    <span class="folder-badge" id="totalFilesBadge">0</span>
                </div>
                <div class="folder-meta">
                    <h2>Cloud Storage</h2>
                    <p id="folderTime">Mengambil data...</p>
                </div>
            </div>
        </div>

        <div class="main-toolbar" id="adminToolbar" style="display: none;">
            <input type="file" id="hiddenFileInput" accept="video/*" style="display: none;" onchange="handleFileUpload(this)">
            <button class="btn-tool blue" onclick="triggerFileInput()"><i class="fa-solid fa-upload"></i>&nbsp; Upload Video</button>
        </div>

        <div class="upload-progress-container" id="uploadProgressBox">
            <div style="display:flex; justify-content:space-between; font-size:12px;">
                <span id="uploadStatusText">Mengunggah video ke cloud...</span>
                <span id="uploadPercentText">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
        </div>

        <div class="file-list-container" id="fileListContainer"></div>

        <div class="pagination-text" id="paginationSummary">Total 0 item</div>
    </main>

    <footer><div>WOJTEK SAS © 2026 , Gofile Automatic System</div></footer>

    <script>
        // =========================================================================
        // HUBUNGKAN DENGAN API SUPABASE ANDA DI SINI
        // =========================================================================
        const SUPABASE_URL = "TEMPEL_PROJECT_URL_DI_SINI"; 
        const SUPABASE_KEY = "TEMPEL_ANON_KEY_DI_SINI";
        const BUCKET_NAME = "video"; 

        let databaseFiles = [];

        // Cek apakah Anda yang membuka sebagai Admin (?admin=1)
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === '1';

        function toggleSidebar() {
            document.getElementById('sidebarMenu').classList.toggle('is-open');
            document.getElementById('sidebarOverlay').classList.toggle('is-visible');
        }

        function triggerFileInput() {
            document.getElementById('hiddenFileInput').click();
        }

        window.onload = function() {
            document.getElementById('folderTime').innerText = new Date().toLocaleString('id-ID');
            
            // Jika Anda yang buka lewat link khusus admin, tombol upload dimunculkan
            if (isAdmin) {
                document.getElementById('adminToolbar').style.display = 'flex';
            }
            
            fetchVideosFromDatabase();
        };

        // =========================================================================
        // AMBIL DAFTAR VIDEO ASLI DARI DATABASE SUPABASE (BISA DILIHAT SEMUA ORANG)
        // =========================================================================
        async function fetchVideosFromDatabase() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/videos_list?order=id.desc`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'apikey': SUPABASE_KEY
                    }
                });
                if (!response.ok) throw new Error('Gagal mengambil data dari database.');
                databaseFiles = await response.json();
                renderFileList();
            } catch (error) {
                console.error(error);
            }
        }

        // =========================================================================
        // PROSES UPLOAD VIDEO KE STORAGE & DATABASE
        // =========================================================================
        async function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const progressBox = document.getElementById('uploadProgressBox');
            const barFill = document.getElementById('progressBarFill');
            const percentText = document.getElementById('uploadPercentText');
            
            progressBox.style.display = 'block';
            barFill.style.width = '20%';
            percentText.innerText = '20%';

            const cleanedFileName = file.name.replace(/[^a-zA-Z0-9.]/g, "_");
            const cloudFilePath = `${Date.now()}_${cleanedFileName}`;

            try {
                // 1. Upload File Fisik Video ke Storage
                const uploadUrl = `${SUPABASE_URL}/storage/v1/object/${BUCKET_NAME}/${cloudFilePath}`;
                const uploadResponse = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'apikey': SUPABASE_KEY,
                        'Content-Type': file.type
                    },
                    body: file
                });

                if (!uploadResponse.ok) throw new Error('Gagal upload file ke Storage.');

                barFill.style.width = '60%';
                percentText.innerText = '60%';

                const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}/${cloudFilePath}`;
                const sizeMB = (file.size / (1024 * 1024)).toFixed(1) + " MB";

                // 2. Simpan Data Link Video ke Tabel Database agar bisa dilihat semua orang
                const dbResponse = await fetch(`${SUPABASE_URL}/rest/v1/videos_list`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        name: file.name,
                        size: sizeMB,
                        cloud_path: cloudFilePath,
                        url: publicUrl
                    })
                });

                if (!dbResponse.ok) throw new Error('Gagal menyimpan data ke database.');

                barFill.style.width = '100%';
                percentText.innerText = '100%';

                setTimeout(() => {
                    progressBox.style.display = 'none';
                    fetchVideosFromDatabase();
                    input.value = '';
                }, 600);

            } catch (error) {
                alert('Error: ' + error.message);
                progressBox.style.display = 'none';
                input.value = '';
            }
        }

        // =========================================================================
        // MENAMPILKAN DAFTAR VIDEO
        // =========================================================================
        function renderFileList() {
            const container = document.getElementById('fileListContainer');
            const badge = document.getElementById('totalFilesBadge');
            const summary = document.getElementById('paginationSummary');
            
            container.innerHTML = '';
            badge.innerText = databaseFiles.length;
            summary.innerText = `Total ${databaseFiles.length} item`;

            if (databaseFiles.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 40px; color:#798b9e; font-size:14px;"><i class="fa-solid fa-cloud-arrow-up" style="font-size:32px; margin-bottom:10px; display:block;"></i>Belum ada video di cloud.</div>`;
                return;
            }

            databaseFiles.forEach(file => {
                const shortName = file.name.length > 25 ? file.name.substring(0, 22) + "..." : file.name;
                const dateClean = file.created_at ? new Date(file.created_at).toLocaleString('id-ID') : 'Baru saja';
                
                // Tombol Hapus sampah hanya muncul di layar HP Anda (sebagai admin)
                const deleteButtonHtml = isAdmin ? `<button class="btn-action" onclick="deleteFile(${file.id}, '${file.cloud_path}')"><i class="fa-solid fa-trash" style="color:#e11d48;"></i></button>` : '';

                const fileRowHtml = `
                    <div class="file-row" id="row-${file.id}">
                        <div class="file-info-container">
                            <div class="file-left-controls">
                                <i class="fa-solid fa-file-video file-icon"></i>
                            </div>
                            <div class="file-details">
                                <div class="file-name" data-short="${shortName}" data-full="${file.name}">${file.name}</div>
                                <div class="file-specs">${dateClean} • ${file.size}</div>
                            </div>
                            <div class="action-group top-action-anchor"></div>
                        </div>

                        <div class="media-display-area">
                            <div class="preview-box" onclick="handleThumbnailClick(this)">
                                <div class="click-overlay"></div>
                                <video preload="metadata" src="${file.url}#t=0.5"></video>
                            </div>

                            <div class="inline-actions side-action-box">
                                <div class="action-group action-buttons">
                                    <button class="btn-action play-trigger" onclick="handlePlay(this)"><i class="fa-solid fa-play"></i></button>
                                    <button class="btn-action close-trigger" onclick="handleClose(this)"><i class="fa-solid fa-xmark"></i></button>
                                    ${deleteButtonHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += fileRowHtml;
            });
        }

        function getFileRowScope(element) { return element.closest('.file-row'); }

        function handleThumbnailClick(previewBox) {
            const fileRow = getFileRowScope(previewBox);
            if (!fileRow.classList.contains('is-playing')) {
                handlePlay(fileRow.querySelector('.play-trigger'));
            }
        }

        function handlePlay(btnElement) {
            const fileRow = getFileRowScope(btnElement);
            const video = fileRow.querySelector('video');
            const topAction = fileRow.querySelector('.top-action-anchor');
            const actionGroup = fileRow.querySelector('.action-buttons');
            const nameText = fileRow.querySelector('.file-name');

            fileRow.classList.add('is-playing');
            nameText.innerText = nameText.getAttribute('data-short');
            video.setAttribute('controls', 'true');
            video.play();
            topAction.appendChild(actionGroup);
        }

        function handleClose(btnElement) {
            const fileRow = getFileRowScope(btnElement);
            const video = fileRow.querySelector('video');
            const sideAction = fileRow.querySelector('.side-action-box');
            const actionGroup = fileRow.querySelector('.action-buttons');
            const nameText = fileRow.querySelector('.file-name');

            fileRow.classList.remove('is-playing');
            nameText.innerText = nameText.getAttribute('data-full');
            video.pause();
            video.removeAttribute('controls');
            sideAction.appendChild(actionGroup);
        }

        // =========================================================================
        // HAPUS VIDEO DARI CLOUD STORAGE & DATABASE
        // =========================================================================
        async function deleteFile(id, cloudPath) {
            if (!confirm("Apakah Anda yakin ingin menghapus video ini dari server cloud?")) return;

            try {
                // 1. Hapus data dari tabel database
                const dbRes = await fetch(`${SUPABASE_URL}/rest/v1/videos_list?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'apikey': SUPABASE_KEY
                    }
                });
                if (!dbRes.ok) throw new Error('Gagal menghapus data di database.');

                // 2. Hapus file fisik dari Storage
                const storageUrl = `${SUPABASE_URL}/storage/v1/object/${BUCKET_NAME}/${cloudPath}`;
                await fetch(storageUrl, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'apikey': SUPABASE_KEY
                    }
                });

                fetchVideosFromDatabase();

            } catch (error) {
                alert('Gagal Menghapus: ' + error.message);
            }
        }
    </script>

    <script src="ads.js"></script>
</body>
</html>
