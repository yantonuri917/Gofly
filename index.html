    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            background-color: #0b0c10;
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            margin: 0;
            user-select: none;
            overflow-x: hidden;
        }

        /* Navigasi */
        .main-nav {
            background-color: #0b0c10;
            border-bottom: 1px solid #1f2937;
            padding: 0.75rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Video Player tanpa tombol tengah */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Controls Overlay */
        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 30px 15px 15px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
        }

        .video-wrapper:hover .controls-overlay {
            opacity: 1;
        }

        /* Slider / Seek Bar */
        .seek-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            position: relative;
            margin-bottom: 12px;
            border-radius: 2px;
            transition: height 0.2s;
        }

        .seek-container:hover, .dragging .seek-container {
            height: 6px;
        }

        .seek-bar-current {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: #ec4899;
            width: 0%;
            border-radius: 2px;
        }

        .seek-handle {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            transition: transform 0.1s;
        }

        .seek-container:hover .seek-handle, .dragging .seek-handle {
            transform: translateY(-50%) scale(1);
        }

        /* Badge ID Style */
        .id-badge {
            font-size: 10px;
            font-weight: 800;
            color: #ec4899;
            background: rgba(236, 72, 153, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(236, 72, 153, 0.2);
            letter-spacing: 1px;
        }

        /* Card Recommendations */
        .video-card {
            position: relative;
            transition: transform 0.3s ease;
        }
        
        .video-card:hover {
            transform: translateY(-4px);
        }

        .play-overlay-btn {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 12px;
        }

        .video-card:hover .play-overlay-btn {
            opacity: 1;
        }
    </style>
</head>

    <main class="max-w-5xl mx-auto">
        <!-- Main Player (Tanpa tombol play di tengah) -->

                <div class="flex items-center justify-between">

        <!-- Rekomendasi Grid -->

            <h2 class="text-[10px] font-black text-gray-500 tracking-[4px] mb-8 uppercase text-center md:text-left">Video Populer</h2>

    <script>
        const video = document.getElementById('mainVideo');
        const container = document.getElementById('playerContainer');
        const seekContainer = document.getElementById('seekContainer');
        const currentBar = document.getElementById('currentBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const muteBtn = document.getElementById('muteBtn');
        
        let isDragging = false;

        const togglePlay = () => {
            if (video.paused) {
                video.play();
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>';
            } else {
                video.pause();
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"></path>';
            }
        };

        playBtn.onclick = togglePlay;

        video.addEventListener('timeupdate', () => {
            if (!isDragging) {
                const percent = (video.currentTime / video.duration) * 100;
                currentBar.style.width = percent + '%';
                updateTimeText();
            }
        });

        const updateTimeText = () => {
            const format = (s) => {
                let m = Math.floor(s / 60);
                s = Math.floor(s % 60);
                return (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s);
            }
            timeDisplay.innerText = `${format(video.currentTime)} / ${format(video.duration || 0)}`;
        };

        const scrub = (e) => {
            const rect = seekContainer.getBoundingClientRect();
            let pos = ((e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left) / rect.width;
            pos = Math.max(0, Math.min(1, pos));
            currentBar.style.width = (pos * 100) + '%';
            if (isDragging) video.currentTime = pos * video.duration;
        };

        seekContainer.onmousedown = (e) => { isDragging = true; scrub(e); };
        window.onmousemove = (e) => { if (isDragging) scrub(e); };
        window.onmouseup = (e) => {
            if (isDragging) {
                isDragging = false;
                scrub(e);
            }
        };

        muteBtn.onclick = () => {
            video.muted = !video.muted;
            document.getElementById('volIcon').style.fill = video.muted ? '#ec4899' : 'currentColor';
        };

        // Playlist data
        const data = [
           { id: "URE-138", url: "https://video.twimg.com/amplify_video/2042164168879710209/vid/avc1/480x270/IIt24dL7sEjIHDXo.mp4?tag=21" },
            { id: "SNOS-202", url: "https://video.twimg.com/amplify_video/2042163089920135168/vid/avc1/480x270/D0z6TwOyov8np6tq.mp4?tag=21" },
            { id: "SNOS-199", url: "https://video.twimg.com/amplify_video/2042165236426473472/vid/avc1/480x270/GG5BP66gWnFFu5DZ.mp4?tag=21" },
            { id: "SNOS-190", url: "https://video.twimg.com/amplify_video/2042127001306460160/vid/avc1/480x270/x-XVW7uMw6YfmAlW.mp4?tag=21" },
            { id: "SNOS-185", url: "https://video.twimg.com/amplify_video/2042124734872350721/vid/avc1/480x270/fe5PpvnFL69uIfGG.mp4?tag=21" },
            { id: "SNOS-170", url: "https://video.twimg.com/amplify_video/2041753223560884228/vid/avc1/480x270/9GMN3k6tiVntSZkh.mp4?tag=21" }
             ];

        const grid = document.getElementById('grid');
        data.forEach(v => {
            const card = document.createElement('div');
            card.className = "video-card cursor-pointer group";
            card.onclick = () => {
                window.scrollTo({top: 0, behavior: 'smooth'});
                document.getElementById('videoID').innerText = v.id;
                video.src = v.url;
                video.play();
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>';
            };
            card.innerHTML = `
                <div class="relative aspect-video rounded-xl overflow-hidden bg-gray-900 border border-gray-800 group-hover:border-pink-500/50 transition-all">
                    <video muted preload="metadata" class="w-full h-full object-cover">
                        <source src="${v.url}#t=0.5">
                    </video>
                    <!-- Tombol Play Baru di Rekomendasi -->
                    <div class="play-overlay-btn">
                        <div class="w-12 h-12 bg-pink-600 rounded-full flex items-center justify-center shadow-lg transform group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6 fill-white ml-1" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                        </div>
                    </div>
                </div>
                <div class="mt-3 flex justify-center">
                    <span class="id-badge">${v.id}</span>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
