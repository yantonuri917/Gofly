<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gofile Interface - Premium Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #182436; color: #f4f6f8; min-height: 100vh; }
        main { max-width: 600px; margin: 0 auto; padding: 16px; }
        
        /* Admin Panel */
        .admin-panel { background: #151f2c; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; flex-direction: column; gap: 10px; }
        .admin-panel input { width: 100%; background: #0b131e; border: 1px solid #33445c; color: white; padding: 12px; border-radius: 6px; }
        .btn-submit { background: #24a148; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Video List */
        .file-row { border-bottom: 1px solid #23334a; padding: 16px 0; }
        .file-name { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
        
        /* Thumbnail & Player */
        .preview-box { 
            width: 100%; height: 220px; background-color: #000; border-radius: 8px; 
            position: relative; overflow: hidden; cursor: pointer;
            background-size: cover; background-position: center; 
            display: flex; align-items: center; justify-content: center;
        }
        .preview-box video { width: 100%; height: 100%; display: none; }
        .play-overlay { font-size: 40px; color: #fff; background: rgba(0,0,0,0.5); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: absolute; }
        
        .is-playing .play-overlay { display: none; }
        .is-playing video { display: block; }
        .is-playing .preview-box { cursor: default; }
    </style>
</head>
<body>

    <main>
        <div class="admin-panel" id="adminFormPanel">
            <input type="text" id="videoNameInput" placeholder="Judul Video">
            <input type="text" id="videoUrlInput" placeholder="URL Video">
            <input type="text" id="videoPosterInput" placeholder="URL Thumbnail (Gambar)">
            <button class="btn-submit" onclick="submitNewVideo()">Tambah Video</button>
        </div>

        <div id="fileListContainer"></div>
    </main>

    <script>
        const SUPABASE_URL = "https://xgmsumukxuwjpztbeuwl.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXN1bXVreHV3anB6dGJldXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE1MzYsImV4cCI6MjA5NTQyNzUzNn0.25t9t71O0O2D11l7GRXtpvOgC2sllXE3xB4nsRKK4oE";
        
        const isAdmin = new URLSearchParams(window.location.search).get('admin') === '1';
        if (isAdmin) document.getElementById('adminFormPanel').style.display = 'flex';

        async function fetchVideosFromDatabase() {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/videos_list?order=id.desc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            const container = document.getElementById('fileListContainer');
            container.innerHTML = '';
            
            data.forEach(f => {
                const posterStyle = f.poster_url ? `style="background-image: url('${f.poster_url}')"` : '';
                container.innerHTML += `
                    <div class="file-row">
                        <div class="file-name">${f.name}</div>
                        <div class="preview-box" ${posterStyle} onclick="this.classList.add('is-playing'); this.querySelector('video').play();">
                            <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
                            <video src="${f.url}" controls></video>
                        </div>
                    </div>
                `;
            });
        }

        async function submitNewVideo() {
            const body = { 
                name: document.getElementById('videoNameInput').value, 
                url: document.getElementById('videoUrlInput').value, 
                poster_url: document.getElementById('videoPosterInput').value 
            };
            await fetch(`${SUPABASE_URL}/rest/v1/videos_list`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            location.reload();
        }

        fetchVideosFromDatabase();
    </script>
</body>
</html>
