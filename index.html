<!DOCTYPE html>
<html lang="id">
<head>
   <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="referrer" content="no-referrer">       
   <title>MissAV Style - Secured</title>
   
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            background-color: #0b0c10;
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            margin: 0;
            user-select: none;
            overflow-x: hidden;
        }

        /* HEADER & IKLAN FIXED */
        .top-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: #0b0c10;
        }

        .main-nav {
            border-bottom: 1px solid #1f2937;
            padding: 0.75rem 1rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .fixed-ads-area {
            width: 100%;
            height: 70px; /* Tinggi tetap iklan */
            border-bottom: 1px solid #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0b0c10;
        }

        .ads-placeholder {
            width: 320px;
            height: 50px;
            background: #1a1b23;
            border: 1px dashed #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .ads-label {
            position: absolute;
            top: 2px;
            left: 5px;
            font-size: 8px;
            color: #475569;
            text-transform: uppercase;
        }

        /* Padding agar konten tidak tertutup (60px nav + 70px iklan) */
        main {
            padding-top: 130px;
        }

        /* Video Player */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 30px 15px 15px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
        }

        .video-wrapper:hover .controls-overlay {
            opacity: 1;
        }

        .seek-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            position: relative;
            margin-bottom: 12px;
            border-radius: 2px;
        }

        .seek-bar-current {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: #ec4899;
            width: 0%;
            border-radius: 2px;
        }

        .id-badge {
            font-size: 10px;
            font-weight: 800;
            color: #ec4899;
            background: rgba(236, 72, 153, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(236, 72, 153, 0.2);
        }

        /* Card Recommendations */
        .video-card {
            position: relative;
            transition: transform 0.3s ease;
        }

        .play-overlay-btn {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 12px;
        }

        .video-card:hover .play-overlay-btn {
            opacity: 1;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- HEADER & IKLAN YANG TIDAK BISA DI-SKROL -->
    <header class="top-container">
        <nav class="main-nav">
            <div class="flex items-center gap-2">
                <div class="bg-pink-600 text-white font-black px-2 py-0.5 rounded text-sm shadow-[0_0_10px_rgba(219,39,119,0.5)]">M</div>
                <span class="font-black text-xl tracking-tighter uppercase">Miss<span class="text-pink-500">av</span></span>
            </div>
            <div class="flex gap-4">
                <div class="w-8 h-8 rounded-full bg-gray-800 border border-gray-700"></div>
            </div>
        </nav>

        <div class="fixed-ads-area">
            <div class="ads-placeholder">
                <span class="ads-label">Advertisement</span>
                <!-- Script Iklan Adsterra -->
                <script type="text/javascript">
                    atOptions = {
                        'key' : 'baa0afb18e2e70c00e4c1406e4824e4b',
                        'format' : 'iframe',
                        'height' : 50,
                        'width' : 320,
                        'params' : {}
                    };
                </script>
                <script type="text/javascript" src="https://braverybreezebinding.com/baa0afb18e2e70c00e4c1406e4824e4b/invoke.js"></script>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto">
        <!-- Player -->
        <div class="video-wrapper" id="playerContainer">
            <video id="mainVideo" playsinline autoplay muted loop>
                <source src="https://video.twimg.com/amplify_video/2041839767864930312/vid/avc1/640x360/I460-OTGEfnF0L4Z.mp4?tag=21" type="video/mp4">
            </video>

            <div class="controls-overlay">
                <div class="seek-container" id="seekContainer">
                    <div class="seek-bar-current" id="currentBar"></div>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button id="playBtn" class="text-white">
                            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24" id="playIcon"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>
                        </button>
                        <span class="text-[10px] font-mono text-gray-400" id="timeDisplay">00:00 / 00:00</span>
                    </div>
                    <button id="muteBtn" class="text-gray-400"><svg class="w-5 h-5 fill-current" viewBox="0 0 24 24" id="volIcon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"></path></svg></button>
                </div>
            </div>
        </div>

        <div class="p-5 flex items-center justify-between border-b border-gray-800">
            <span id="videoID" class="id-badge">URE-138</span>
            <button class="bg-pink-600 text-[10px] font-black px-5 py-2 rounded-full">IKUTI</button>
        </div>

        <!-- Rekomendasi -->
        <div class="px-5 py-8">
            <h2 class="text-[10px] font-black text-gray-500 tracking-[4px] mb-8 uppercase">Video Populer</h2>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
        </div>
        
        <!-- Konten tambahan agar bisa di-scroll untuk testing -->
        <div class="h-screen"></div>
    </main>

    <script>
        const video = document.getElementById('mainVideo');
        const currentBar = document.getElementById('currentBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');

        playBtn.onclick = () => {
            if (video.paused) { video.play(); playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>'; }
            else { video.pause(); playIcon.innerHTML = '<path d="M8 5v14l11-7z"></path>'; }
        };

        video.addEventListener('timeupdate', () => {
            const percent = (video.currentTime / video.duration) * 100;
            currentBar.style.width = percent + '%';
            const m = Math.floor(video.currentTime / 60);
            const s = Math.floor(video.currentTime % 60);
            const dm = Math.floor(video.duration / 60) || 0;
            const ds = Math.floor(video.duration % 60) || 0;
            timeDisplay.innerText = `${m}:${s < 10 ? '0'+s : s} / ${dm}:${ds < 10 ? '0'+ds : ds}`;
        });

        const data = [
            { id: "URE-138", url: "https://video.twimg.com/amplify_video/2042164168879710209/vid/avc1/480x270/IIt24dL7sEjIHDXo.mp4?tag=21" },
            { id: "SNOS-202", url: "https://video.twimg.com/amplify_video/2042163089920135168/vid/avc1/480x270/D0z6TwOyov8np6tq.mp4?tag=21" },
            { id: "SNOS-199", url: "https://video.twimg.com/amplify_video/2042165236426473472/vid/avc1/480x270/GG5BP66gWnFFu5DZ.mp4?tag=21" },
            { id: "SNOS-190", url: "https://video.twimg.com/amplify_video/2042127001306460160/vid/avc1/480x270/x-XVW7uMw6YfmAlW.mp4?tag=21" },
            { id: "SNOS-185", url: "https://video.twimg.com/amplify_video/2042124734872350721/vid/avc1/480x270/fe5PpvnFL69uIfGG.mp4?tag=21" },
            { id: "SNOS-170", url: "https://video.twimg.com/amplify_video/2041753223560884228/vid/avc1/480x270/9GMN3k6tiVntSZkh.mp4?tag=21" }
             ];

        const grid = document.getElementById('grid');
        data.forEach(v => {
            const card = document.createElement('div');
            card.className = "video-card cursor-pointer group";
            card.onclick = () => {
                window.scrollTo({top: 130, behavior: 'smooth'}); // Scroll ke atas player (di bawah header fixed)
                document.getElementById('videoID').innerText = v.id;
                video.src = v.url;
                video.play();
            };
            card.innerHTML = `
                <div class="relative aspect-video rounded-xl overflow-hidden bg-gray-900 border border-gray-800">
                    <video muted preload="metadata" class="w-full h-full object-cover"><source src="${v.url}#t=0.5"></video>
                    <div class="play-overlay-btn">
                        <div class="w-12 h-12 bg-pink-600 rounded-full flex items-center justify-center shadow-lg">
                            <svg class="w-6 h-6 fill-white ml-1" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                        </div>
                    </div>
                </div>
                <div class="mt-3 flex justify-center"><span class="id-badge">${v.id}</span></div>
            `;
            grid.appendChild(card);
        });
    </script>
